---
# ConfigMap with the slow-start app source code
apiVersion: v1
kind: ConfigMap
metadata:
  name: slow-app-code
data:
  server.py: |
    import time
    import threading
    import json
    import sys
    from http.server import HTTPServer, BaseHTTPRequestHandler

    initialized = False
    init_start = time.time()

    def init():
        global initialized
        print("Starting initialization... (this takes 30 seconds)")
        sys.stdout.flush()
        time.sleep(30)
        initialized = True
        init_end = time.time()
        print(f"Initialization complete in {init_end - init_start:.1f}s")
        sys.stdout.flush()

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/ready':
                if initialized:
                    body = json.dumps({"status": "ready", "initialized": True}).encode()
                    self.send_response(200)
                else:
                    body = json.dumps({"status": "initializing", "initialized": False}).encode()
                    self.send_response(503)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(body)
            elif self.path == '/healthz':
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b'ok')
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, format, *args):
            pass

    thread = threading.Thread(target=init)
    thread.daemon = True
    thread.start()

    server = HTTPServer(('', 8080), Handler)
    print("HTTP server started on :8080")
    server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-app
  template:
    metadata:
      labels:
        app: slow-app
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python3", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-code
          mountPath: /app
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 20
      volumes:
      - name: app-code
        configMap:
          name: slow-app-code
