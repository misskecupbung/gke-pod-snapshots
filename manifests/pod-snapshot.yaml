# PodSnapshot resource
# This tells GKE to checkpoint the memory state of the selected pod.
# The snapshot is stored in a GCS bucket in your project.
#
# Requirements:
#   - Cluster must be created with --enable-pod-snapshots
#   - The target pod must be running and in a ready state
#
# Check the GKE docs for the latest API version:
# https://cloud.google.com/kubernetes-engine/docs/how-to/pod-snapshots

apiVersion: podsnapshot.gke.io/v1
kind: PodSnapshot
metadata:
  name: slow-app-snapshot
  namespace: default
spec:
  # Select the pod to checkpoint
  podSelector:
    matchLabels:
      app: slow-app
  # Optional: retention policy (default is to keep the snapshot until manually deleted)
  retentionPolicy:
    maxSnapshots: 3
